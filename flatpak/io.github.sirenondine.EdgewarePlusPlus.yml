id: io.github.sirenondine.EdgewarePlusPlus
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: edgeware

finish-args:
  # Wayland only (layer-shell popups require it).
  - --socket=wayland
  - --socket=pulseaudio
  - --share=ipc
  # Booru downloads, version check, Discord RPC.
  - --share=network
  # GPU (dri) + evdev for the panic-hotkey fallback.
  - --device=all
  # Packs, fill-drive / replace-images, reading the current wallpaper.
  - --filesystem=home
  # Native tray (StatusNotifierItem) and notifications.
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop

cleanup:
  - /include
  - /lib/pkgconfig
  - '*.la'
  - '*.a'

modules:
  # gtk4-layer-shell is not in the GNOME runtime; build it (gtk4paintablesink
  # and the rest of GStreamer come from the runtime).
  - name: gtk4-layer-shell
    buildsystem: meson
    config-opts:
      - -Dexamples=false
      - -Ddocs=false
      - -Dtests=false
    sources:
      - type: git
        url: https://github.com/wmww/gtk4-layer-shell.git
        tag: v1.3.0

  # Python dependencies (PyGObject is provided by the runtime).
  - name: python-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-cache-dir
        booru desktop-notifier evdev filetype get-video-properties pillow pynput
        pypresence requests screeninfo voluptuous
    cleanup:
      - /lib/python*/site-packages/*/tests

  # The application itself (committed files only — data/ and .venv are skipped).
  - name: edgeware
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/edgeware
      - cp -r src assets /app/share/edgeware/
      - install -Dm755 flatpak/edgeware-launch /app/bin/edgeware
      - install -Dm755 flatpak/edgeware-config /app/bin/edgeware-config
      - install -Dm644 flatpak/io.github.sirenondine.EdgewarePlusPlus.desktop
        /app/share/applications/io.github.sirenondine.EdgewarePlusPlus.desktop
      - install -Dm644 flatpak/io.github.sirenondine.EdgewarePlusPlus.metainfo.xml
        /app/share/metainfo/io.github.sirenondine.EdgewarePlusPlus.metainfo.xml
      - install -Dm644 flatpak/io.github.sirenondine.EdgewarePlusPlus.png
        /app/share/icons/hicolor/256x256/apps/io.github.sirenondine.EdgewarePlusPlus.png
    sources:
      # Build from the committed tree (not the working dir) so the app is
      # reproducible and immune to editor/working-tree drift.
      - type: git
        url: file:///home/ondine/.local/share/edgeware
        branch: main
